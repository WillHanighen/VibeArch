# VibeArch Hyprland baseline

monitor=,preferred,auto,1
$mod=SUPER
env=XCURSOR_SIZE,24
env=QT_QPA_PLATFORM,wayland;xcb
env=XDG_CURRENT_DESKTOP,Hyprland

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
# Install/enable hyprscrolling via hyprpm on first session.
exec-once = bash -lc "[ -x /usr/local/share/vibearch/scripts/hyprscrolling-setup.sh ] && /usr/local/share/vibearch/scripts/hyprscrolling-setup.sh"
exec-once = nm-applet --indicator
exec-once = waybar
exec-once = dunst
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

input {
  kb_layout = us
  follow_mouse = 1
  touchpad {
    natural_scroll = true
    tap-to-click = true
  }
}

general {
  gaps_in = 6
  gaps_out = 12
  border_size = 2
  layout = dwindle
}

plugin {
  hyprscrolling {
    column_width = 0.7
    fullscreen_on_one_column = false
    follow_focus = true
  }
}

decoration {
  rounding = 8
  blur {
    enabled = true
    size = 4
    passes = 1
  }
}

animations {
  enabled = true
}

dwindle {
  pseudotile = true
  preserve_split = true
}

misc {
  disable_hyprland_logo = true
}

bind = $mod, RETURN, exec, kitty
bind = $mod, Q, killactive,
bind = $mod SHIFT, E, exit,
bind = $mod, D, exec, rofi -show drun
bind = $mod, F, fullscreen,
bind = $mod, V, togglefloating,
bind = $mod, P, pseudo,
bind = $mod, J, togglesplit,
bind = $mod, B, exec, firefox

bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d
bind = $mod, period, layoutmsg, move +col
bind = $mod, comma, layoutmsg, move -col

bind = $mod SHIFT, left, movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up, movewindow, u
bind = $mod SHIFT, down, movewindow, d
bind = $mod SHIFT, period, layoutmsg, movewindowto r
bind = $mod SHIFT, comma, layoutmsg, movewindowto l

bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5

bind = , Print, exec, grim -g "$(slurp)" - | wl-copy
bind = $mod, Print, exec, grim ~/Pictures/screenshot-$(date +%F-%H%M%S).png

bindel = ,XF86AudioRaiseVolume, exec, pamixer -i 5
bindel = ,XF86AudioLowerVolume, exec, pamixer -d 5
bindel = ,XF86AudioMute, exec, pamixer -t
bindel = ,XF86MonBrightnessUp, exec, brightnessctl set +10%
bindel = ,XF86MonBrightnessDown, exec, brightnessctl set 10%-
